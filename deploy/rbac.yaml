# RBAC 配置：为 ark-hub 提供 Kubernetes API 权限
# 
# 权限说明：
# - 必需: nodes(get/list/patch) + pods(get/list)，用于读取状态和节点污点操作
# - 可选(启用自动隔离/驱逐才需要): pods(delete) + pods/eviction(create)

apiVersion: v1
kind: ServiceAccount
metadata:
  name: ark-hub-sa
  namespace: ark-system
  labels:
    app: ark-hub
    component: control-plane
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ark-hub-controller
  labels:
    app: ark-hub
    component: control-plane
rules:
  # Node 相关权限：查询和打污点
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "patch"]
  
  # Pod 相关权限：查询必需；delete 仅自动驱逐时需要
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
  
  # Pod Eviction 权限：仅自动驱逐时需要（尊重 PDB）
  - apiGroups: ["policy"]
    resources: ["pods/eviction"]
    verbs: ["create"]
  
  # 可选：如果需要查询 Pod 的详细信息（如 ownerReferences）
  - apiGroups: [""]
    resources: ["pods/status"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ark-hub-controller-binding
  labels:
    app: ark-hub
    component: control-plane
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ark-hub-controller
subjects:
  - kind: ServiceAccount
    name: ark-hub-sa
    namespace: ark-system
