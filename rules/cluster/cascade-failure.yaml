    - "网络拥塞放大"
solution_steps:
  - step: 1
    action: "立即标注事故并冻结高风险动作"
    command: null
    manual: true
  - step: 2
    action: "优先隔离故障节点"
    command: "kubectl cordon <node>"
    manual: true
related_evidences:
  - "error.hw"
  - "error.net"
  - "process.state"
applicability:
  min_confidence: 0.88
  required_events:
    - "error.hw"
    - "error.net"
