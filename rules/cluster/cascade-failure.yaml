id: cluster.cascade_failure.v1
name: "集群级级联故障"
scene: "cluster.cascade_failure"
priority: 98
reason_codes:
  - "CASCADE_FAILURE"
  - "BLAST_RADIUS_EXPANDING"
conditions:
  - type: "event"
    event_type: "error.hw"
    value_pattern: "xid|ecc|reset"
  - type: "event"
    event_type: "error.net"
    value_pattern: "congestion|timeout|partition"
