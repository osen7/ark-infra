name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  rules-change-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enforce rules companion changes
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
          NO_FIXTURE_NEEDED: ${{ github.event_name == 'pull_request' && contains(join(github.event.pull_request.labels.*.name, ','), 'no-fixture-needed') }}
        run: |
          bash scripts/check-rules-change.sh "${BASE_SHA}" "${HEAD_SHA}"

  rules-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Validate rules package
        run: |
          cargo test -p ark-core --test rules_package_validation
          cargo test -p ark-core --test rules_fixtures
          cargo test -p ark-core --test catalog_lint

  doc-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check markdown links
        run: bash scripts/check-doc-links.sh

      - name: Check docs index coverage
        run: bash scripts/check-doc-index.sh

  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust fmt
        run: cargo fmt --all -- --check

      - name: Rust clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Rust test
        run: cargo test --workspace

      - name: CLI smoke
        run: |
          cargo run -p ark -- --help >/dev/null
          cargo run -p ark -- doctor --json >/dev/null
          WHY_JSON="$(cargo run -q -p ark -- why 999999 --json 2>/dev/null || true)"
          echo "${WHY_JSON}" | grep -E '"schema_version"[[:space:]]*:[[:space:]]*1' >/dev/null
          cargo run -q -p ark-hub -- --http-listen 127.0.0.1:18081 --ws-listen 127.0.0.1:18080 --rules-dir rules --wal-path /tmp/ark-ci-hub.wal.jsonl >/tmp/ark-ci-hub.log 2>&1 &
          HUB_PID=$!
          trap 'kill ${HUB_PID} 2>/dev/null || true' EXIT
          for i in $(seq 1 30); do
            if curl --noproxy '*' -fsS http://127.0.0.1:18081/api/v1/health >/tmp/ark-ci-hub-health.json; then
              break
            fi
            sleep 1
          done
          grep -E '"status"[[:space:]]*:[[:space:]]*"ok"' /tmp/ark-ci-hub-health.json >/dev/null
          grep -E '"wal"' /tmp/ark-ci-hub-health.json >/dev/null
          grep -E '"active_exists"' /tmp/ark-ci-hub-health.json >/dev/null
