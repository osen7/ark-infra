name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  rules-change-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enforce rules companion changes
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
          NO_FIXTURE_NEEDED: ${{ github.event_name == 'pull_request' && contains(join(github.event.pull_request.labels.*.name, ','), 'no-fixture-needed') }}
        run: |
          bash scripts/check-rules-change.sh "${BASE_SHA}" "${HEAD_SHA}"

  rules-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Validate rules package
        run: |
          cargo test -p ark-core --test rules_package_validation
          cargo test -p ark-core --test rules_fixtures

  rules-strict:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Strict rules gate
        env:
          ARK_RULES_STRICT: "1"
        run: cargo test -p ark-core --test rules_fixtures

  doc-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check markdown links
        run: bash scripts/check-doc-links.sh

      - name: Check docs index coverage
        run: bash scripts/check-doc-index.sh

  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust fmt
        run: cargo fmt --all -- --check

      - name: Rust clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Rust test
        run: cargo test --workspace

      - name: CLI smoke
        run: |
          cargo run -p ark -- --help >/dev/null
          cargo run -p ark -- doctor --json >/dev/null

  helm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Helm lint
        run: helm lint charts/ark-infra

      - name: Helm template
        run: helm template ark charts/ark-infra --namespace ark-system >/dev/null
