apiVersion: v1
kind: Service
metadata:
  name: {{ include "ark-infra.fullname" . }}-hub
  labels:
    app.kubernetes.io/name: {{ include "ark-infra.name" . }}
    app.kubernetes.io/component: hub
spec:
  type: {{ .Values.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "ark-infra.name" . }}
    app.kubernetes.io/component: hub
  ports:
    - name: websocket
      port: {{ .Values.hub.wsPort }}
      targetPort: websocket
      protocol: TCP
    - name: http-api
      port: {{ .Values.hub.httpPort }}
      targetPort: http-api
      protocol: TCP
