{{- if .Values.rbac.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "ark-infra.fullname" . }}-hub-sa
  labels:
    app.kubernetes.io/name: {{ include "ark-infra.name" . }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "ark-infra.fullname" . }}-hub-controller
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
  - apiGroups: ["policy"]
    resources: ["pods/eviction"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "ark-infra.fullname" . }}-hub-controller-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "ark-infra.fullname" . }}-hub-controller
subjects:
  - kind: ServiceAccount
    name: {{ include "ark-infra.fullname" . }}-hub-sa
    namespace: {{ .Release.Namespace }}
{{- end }}
