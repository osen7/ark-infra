apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ark-infra.fullname" . }}-hub
  labels:
    app.kubernetes.io/name: {{ include "ark-infra.name" . }}
    app.kubernetes.io/component: hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "ark-infra.name" . }}
      app.kubernetes.io/component: hub
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "ark-infra.name" . }}
        app.kubernetes.io/component: hub
    spec:
      {{- if .Values.rbac.create }}
      serviceAccountName: {{ include "ark-infra.fullname" . }}-hub-sa
      {{- end }}
      containers:
        - name: hub
          image: "{{ .Values.hub.image.repository }}:{{ .Values.hub.image.tag }}"
          imagePullPolicy: {{ .Values.hub.image.pullPolicy }}
          args:
            - "--ws-listen"
            - "0.0.0.0:{{ .Values.hub.wsPort }}"
            - "--http-listen"
            - "0.0.0.0:{{ .Values.hub.httpPort }}"
            - "--rules-dir"
            - "{{ .Values.hub.rulesDir }}"
            - "--event-buffer-size"
            - "{{ .Values.hub.eventBufferSize }}"
            {{- if .Values.hub.enableK8sController }}
            - "--enable-k8s-controller"
            {{- end }}
          ports:
            - name: websocket
              containerPort: {{ .Values.hub.wsPort }}
            - name: http-api
              containerPort: {{ .Values.hub.httpPort }}
          readinessProbe:
            httpGet:
              path: /api/v1/ps
              port: http-api
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/v1/ps
              port: http-api
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            {{- toYaml .Values.hub.resources | nindent 12 }}
